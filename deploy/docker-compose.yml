services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: traffic-backend
    ports:
      - "8000:8000"
    volumes:
      - ../backend/app/weights:/app/weights
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: traffic-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
